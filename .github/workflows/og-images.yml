name: Generate OG Images
on:
  push:
    branches: [main]
  #   paths:
  #     - 'content/**/*.md'
  #     - 'templates/**'
  pull_request:
    paths:
      - 'content/**/*.md'
      - 'templates/**'

jobs:
  generate:
    permissions:
      contents: read
      pull-requests: write
      packages: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: generate
        uses: riceball-tw/goog@v3.0.2
        with:
          scan_markdown: content/blog
          template: templates/og.html
          post_preview: "true"
      - uses: actions/upload-artifact@v4
        with:
          name: og-images
          path: ${{ steps.generate.outputs.artifact_path }}
          if-no-files-found: error
