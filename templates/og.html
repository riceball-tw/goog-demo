<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{.Title}}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;600;800&family=Playfair+Display:wght@800&family=Noto+Serif+TC:wght@600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1200px; height: 630px;
      font-family: 'Inter', 'Noto Serif TC', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex; flex-direction: column; justify-content: center; align-items: center;
      color: white; padding: 60px; position: relative; overflow: hidden;
    }
    .bg-shape {
      position: absolute; border-radius: 50%; opacity: 0.15;
      background: white;
    }
    .bg-shape:nth-child(1) { width: 400px; height: 400px; top: -100px; right: -100px; }
    .bg-shape:nth-child(2) { width: 300px; height: 300px; bottom: -50px; left: -50px; }
    .bg-shape:nth-child(3) { width: 200px; height: 200px; top: 50%; left: 10%; }
    .content { position: relative; z-index: 1; text-align: center; max-width: 900px; }
    .tag {
      display: inline-block; background: rgba(255,255,255,0.2);
      backdrop-filter: blur(10px); padding: 8px 24px; border-radius: 50px;
      font-size: 18px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase;
      margin-bottom: 24px; border: 1px solid rgba(255,255,255,0.3);
    }
    h1 { font-size: 64px; font-weight: 700; line-height: 1.25; margin-bottom: 16px; text-shadow: 0 4px 20px rgba(0,0,0,0.2); font-family: 'Playfair Display', 'Noto Serif TC', Georgia, serif; }
    .description { font-size: 24px; opacity: 0.9; line-height: 1.6; margin-bottom: 40px; font-weight: 400; }
    .footer { display: flex; align-items: center; justify-content: center; gap: 12px; opacity: 0.8; font-size: 18px; }
    .site-icon { width: 24px; height: 24px; background: rgba(255,255,255,0.3); border-radius: 6px; display: flex; align-items: center; justify-content: center; }
  </style>
</head>
<body>
  <div class="bg-shape"></div>
  <div class="bg-shape"></div>
  <div class="bg-shape"></div>
  <div class="content">
    <div class="tag">{{.tag}}</div>
    <h1>{{.title}}</h1>
    <p class="description">{{.description}}</p>
    <div class="footer">
      <div class="site-icon">🌐</div>
      <span>{{.site_name}}</span>
    </div>
  </div>
</body>
</html>
